name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v --cov --cov-report=term
      - name: Write coverage report to workflow summary
        if: always()
        run: |
          {
            echo "## Coverage report"
            echo ""
            coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - examples/alerts.md
          - examples/basic.md
          - examples/code-blocks.md
          - examples/images.md
          # - examples/mermaid.md  # requires mmdc (Puppeteer sandbox issue in CI)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python markdown2docx.py ${{ matrix.example }} -o output
